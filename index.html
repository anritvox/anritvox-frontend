<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#22d3ee" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anritvox" />
    <link rel="apple-touch-icon" href="/logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Anritvox</title>
    <meta
      name="description"
      content="Discover the MS111 car stereo at AnritVox: USB, AUX & FM support, wireless remote control, crystal-clear sound, free shipping on all orders, and dedicated 24/7 support."
    />
    <link rel="canonical" href="https://www.anritvox.com/" />

    <meta property="og:title" content="Anritvox - MS111 Car Stereo" />
    <meta
      property="og:description"
      content="Discover the MS111 car stereo at AnritVox: USB, AUX & FM support, wireless remote control, crystal-clear sound, free shipping on all orders, and dedicated 24/7 support."
    />

    <meta property="og:image" content="https://www.anritvox.com/logo.webp" />
    <meta property="og:url" content="https://www.anritvox.com/" />
    <meta property="og:type" content="website" />

    <!-- Basic Twitter Card Tags -->
    <!-- These tags also use 'name' or 'property' as per Twitter Card specifications for Twitter sharing. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Anritvox - MS111 Car Stereo" />
    <meta
      name="twitter:description"
      content="Discover the MS111 car stereo at AnritVox: USB, AUX & FM support, wireless remote control, crystal-clear sound, free shipping on all orders, and dedicated 24/7 support."
    />
    <!-- IMPORTANT: Replace 'https://www.yourwebsite.com/path/to/your-image.jpg' with the actual URL where your image is hosted. -->
    <meta name="twitter:image" content="https://www.anritvox.com/logo.webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
        <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
